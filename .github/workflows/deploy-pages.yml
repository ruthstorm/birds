name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build secret
        env:
          VITE_TOP_BIRDS_FUNCTION_URL: ${{ secrets.VITE_TOP_BIRDS_FUNCTION_URL }}
        run: |
          if [ -z "$VITE_TOP_BIRDS_FUNCTION_URL" ]; then
            echo "Missing GitHub Actions secret: VITE_TOP_BIRDS_FUNCTION_URL"
            exit 1
          fi

      - name: Build
        env:
          VITE_TOP_BIRDS_FUNCTION_URL: ${{ secrets.VITE_TOP_BIRDS_FUNCTION_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4